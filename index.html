<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대출 고객관리 시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #f0f4f8; --navy2: #ffffff; --navy3: #e8edf3;
  --blue: #1a6eb5; --blue-light: #2388e0;
  --accent: #e07b00; --green: #1d9e52; --red: #d63031;
  --gray: #6b7a8d; --gray2: #4a5568; --white: #1a2335;
  --card: #ffffff; --border: rgba(0,0,0,0.09);
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nanum Gothic',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; }

/* 로그인 */
#login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#dde8f5,#eaf1fb,#d0e4f7); }
.login-box { background:#fff; border-radius:16px; padding:48px 40px; width:360px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
.login-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--blue),var(--accent)); }
.login-logo { font-size:13px; letter-spacing:3px; color:var(--gray); margin-bottom:8px; font-family:'IBM Plex Mono',monospace; }
.login-title { font-size:26px; font-weight:800; margin-bottom:32px; }
.login-title span { color:var(--blue-light); }
.form-group { margin-bottom:18px; }
.form-group label { display:block; font-size:12px; color:var(--gray); margin-bottom:7px; letter-spacing:1px; }
.form-group input { width:100%; padding:11px 14px; background:var(--navy3); border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:'Nanum Gothic',sans-serif; outline:none; transition:border 0.2s; }
.form-group input:focus { border-color:var(--blue-light); }
.login-btn { width:100%; padding:13px; background:linear-gradient(90deg,var(--blue),var(--blue-light)); border:none; border-radius:8px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; font-family:'Nanum Gothic',sans-serif; }
.login-error { color:var(--red); font-size:13px; margin-top:10px; text-align:center; min-height:18px; }

/* 앱 */
#app { display:none; flex-direction:column; min-height:100vh; }
header { background:#fff; border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
.header-left { display:flex; align-items:center; gap:14px; }
.header-logo { font-family:'IBM Plex Mono',monospace; font-size:13px; letter-spacing:2px; color:var(--gray); }
.header-title { font-size:16px; font-weight:800; }
.header-right { display:flex; align-items:center; gap:12px; }
.user-badge { display:flex; align-items:center; gap:8px; background:var(--navy3); border-radius:20px; padding:5px 14px 5px 8px; }
.user-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#fff; }
.user-name { font-size:13px; font-weight:700; }
.role-tag { font-size:10px; padding:2px 8px; border-radius:10px; font-family:'IBM Plex Mono',monospace; font-weight:600; }
.logout-btn { background:none; border:1px solid var(--border); border-radius:8px; color:var(--gray); font-size:13px; padding:6px 14px; cursor:pointer; font-family:'Nanum Gothic',sans-serif; }

main { display:flex; flex:1; }
aside { width:220px; background:#fff; border-right:1px solid var(--border); padding:24px 0; flex-shrink:0; }
.side-label { font-size:10px; letter-spacing:2px; color:var(--gray); padding:0 20px 10px; text-transform:uppercase; font-family:'IBM Plex Mono',monospace; }
.side-item { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:14px; font-weight:700; cursor:pointer; transition:background 0.15s; border-left:3px solid transparent; color:var(--gray2); }
.side-item:hover { background:var(--navy3); }
.side-item.active { background:rgba(26,110,181,0.15); border-left-color:var(--blue-light); color:var(--white); }
.content { flex:1; padding:28px; overflow-y:auto; }

/* 통계 카드 */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
.stat-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; }
.stat-label { font-size:11px; color:var(--gray); margin-bottom:8px; letter-spacing:1px; }
.stat-num { font-size:28px; font-weight:800; font-family:'IBM Plex Mono',monospace; }
.stat-sub { font-size:12px; color:var(--gray); margin-top:4px; }

/* 툴바 */
.toolbar { display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
.toolbar-title { font-size:18px; font-weight:800; flex:1; }
.search-input { background:#fff; border:1px solid var(--border); border-radius:8px; padding:8px 14px; font-size:13px; width:220px; outline:none; font-family:'Nanum Gothic',sans-serif; }
.search-input:focus { border-color:var(--blue-light); }
.add-btn { background:linear-gradient(90deg,var(--blue),var(--blue-light)); border:none; border-radius:8px; color:#fff; padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Nanum Gothic',sans-serif; }

/* 필터 */
.filter-row { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.filter-btn { padding:5px 12px; border-radius:20px; font-size:12px; font-weight:700; border:1px solid var(--border); background:none; color:var(--gray2); cursor:pointer; font-family:'Nanum Gothic',sans-serif; }
.filter-btn.active, .filter-btn:hover { background:var(--blue); border-color:var(--blue); color:#fff; }

/* 테이블 */
.table-wrap { background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
thead { background:var(--navy3); }
thead th { padding:13px 16px; font-size:11px; color:var(--gray); text-align:left; letter-spacing:1px; font-weight:700; }
tbody tr { transition:background 0.15s; cursor:pointer; box-shadow:inset 0 -2px 0 #4a5568; }
tbody tr:hover { background:#f5f8fc; }
tbody td { padding:12px 16px; font-size:14px; }
.empty-row { text-align:center; padding:40px; color:var(--gray); background:#fff; border-radius:12px; }

/* 뱃지 */
.badge { display:inline-block; font-size:10px; padding:2px 6px; border-radius:4px; font-weight:700; margin-right:4px; }
.badge-dup { background:#e74c3c; color:#fff; }
.badge-resv { background:#8e44ad; color:#fff; }
.badge-today { background:#e74c3c; color:#fff; }

/* 상태 */
.status-select { font-size:12px; padding:3px 6px; border:1px solid var(--border); border-radius:6px; background:#fff; font-weight:700; cursor:pointer; font-family:'Nanum Gothic',sans-serif; }
.st-approved { background:#1a6eb5!important; color:#fff!important; border-color:#1a6eb5!important; }
tr.row-approved td { background:rgba(26,110,181,0.06)!important; }

/* 모달 */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.detail-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:flex-start; justify-content:flex-end; }
.detail-bg.open { display:flex; }
.detail-modal { background:#fff; width:900px; max-width:95vw; height:100vh; overflow-y:auto; box-shadow:-4px 0 24px rgba(0,0,0,0.15); }
.detail-header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); position:sticky; top:0; background:#fff; z-index:10; }
.detail-header-title { font-size:16px; font-weight:800; display:flex; align-items:center; gap:8px; }
.detail-body { padding:24px; }
.detail-section { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:20px; }
.detail-section-title { font-size:14px; font-weight:800; margin-bottom:16px; color:var(--blue); }
.detail-grid { display:grid; grid-template-columns:100px 1fr 100px 1fr; gap:0; }
.detail-grid > div { padding:9px 13px; font-size:13px; border-bottom:1px solid #f0f4f8; }
.detail-label { color:var(--gray); font-weight:700; background:#fafbfc; }
.detail-edit-input { width:100%; border:2px solid #a0aec0; border-radius:6px; padding:6px 10px; font-size:13px; font-family:'Nanum Gothic',sans-serif; outline:none; background:#fff; }
.detail-edit-input:focus { border-color:var(--blue-light); border-width:2px; }
.detail-edit-select { width:100%; border:2px solid #a0aec0; border-radius:6px; padding:6px 8px; font-size:13px; font-family:'Nanum Gothic',sans-serif; outline:none; background:#fff; }
.d-btn { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:#fff; font-family:'Nanum Gothic',sans-serif; }
.d-btn.primary { background:linear-gradient(90deg,var(--blue),var(--blue-light)); color:#fff; border:none; }
.d-btn.danger { background:#fff; color:var(--red); border-color:var(--red); }
.detail-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--gray); padding:4px 8px; }

/* 진행과정 */
.progress-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid #f0f4f8; font-size:13px; }
.prog-time { color:var(--gray); font-size:11px; white-space:nowrap; font-family:'IBM Plex Mono',monospace; }
.prog-agent { background:var(--blue); color:#fff; border-radius:4px; padding:1px 6px; font-size:11px; font-weight:700; white-space:nowrap; }
.prog-text { flex:1; color:var(--white); }
.prog-del { background:none; border:none; color:var(--gray); cursor:pointer; font-size:16px; padding:0 4px; }

/* 승인내역 */
.approval-table { width:100%; border-collapse:collapse; font-size:13px; }
.approval-table th, .approval-table td { padding:8px 12px; border:1px solid var(--border); text-align:left; }
.approval-table th { background:#f5f8fc; font-weight:700; }
.approval-add-row { display:flex; gap:8px; flex-wrap:wrap; padding:10px 0 0; }
.approval-add-row input { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:'Nanum Gothic',sans-serif; outline:none; }

/* 상담메모 */
.counsel-memo { width:100%; min-height:100px; border:1px solid var(--border); border-radius:8px; padding:10px; font-size:13px; font-family:'Nanum Gothic',sans-serif; resize:vertical; outline:none; }
.counsel-memo:focus { border-color:var(--blue-light); }

/* 페이지네이션 */
.pagination { display:flex; gap:4px; justify-content:center; margin-top:16px; flex-wrap:wrap; }
.pg-btn { padding:5px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; cursor:pointer; background:#fff; font-weight:600; }
.pg-btn.active, .pg-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
.pg-btn:disabled { opacity:0.4; cursor:not-allowed; }

/* 토스트 */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1a6eb5; color:#fff; padding:10px 24px; border-radius:20px; font-size:14px; font-weight:700; z-index:9999; }

/* 중복 메시지 */
#phone-dup-msg { grid-column:1/-1; font-size:12px; padding:5px 13px; display:none; color:var(--red); font-weight:700; background:#fff5f5; border-radius:6px; margin:0 0 4px; }

/* 로딩 */
.loading { text-align:center; padding:60px; color:var(--gray); font-size:16px; }

/* 실적현황 */
.perf-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:12px; }
.perf-table th, .perf-table td { padding:10px 16px; text-align:left; border-bottom:1px solid var(--border); }
.perf-table th { background:#f5f8fc; font-weight:700; color:var(--gray); font-size:11px; letter-spacing:1px; }
.perf-table tr:hover td { background:#f5f8fc; }

@media (max-width: 768px) {
  aside { display:none; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .detail-grid { grid-template-columns:80px 1fr; }
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">LOAN CRM</div>
    <div class="login-title">대출 <span>고객관리</span></div>
    <div class="form-group">
      <label>아이디</label>
      <input type="text" id="inp-id" placeholder="아이디 입력">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="inp-pw" placeholder="비밀번호 입력">
    </div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">LOAN CRM</div>
      <div class="header-title">대출 고객관리 시스템</div>
    </div>
    <div class="header-right">
      <div id="resv-btn" style="display:none;background:#8e44ad;border:none;border-radius:8px;color:#fff;font-size:13px;padding:6px 14px;cursor:pointer;font-weight:700" onclick="goTodayFilter()">📞 오늘예약 <span id="resv-count"></span></div>
      <div class="user-badge">
        <div class="user-avatar" id="hdr-avatar"></div>
        <div class="user-name" id="hdr-name"></div>
        <span class="role-tag" id="hdr-role"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>
  <main>
    <aside>
      <div class="side-label">메뉴</div>
      <div class="side-item active" id="menu-dashboard" onclick="showTab('dashboard')">📊 대시보드</div>
      <div class="side-item" id="menu-expiry" onclick="showTab('expiry')">⏰ 만기알림 <span id="expiry-badge" style="display:none;background:#e74c3c;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px"></span></div>
      <div class="side-item admin-only" id="menu-staff" onclick="showTab('staff')" style="display:none">👤 담당자 관리</div>
      <div class="side-item admin-only" id="menu-phone-usage" onclick="showTab('phone-usage')" style="display:none">📱 휴대폰 사용현황</div>
      <div class="side-item" id="menu-receipt-stats" onclick="showTab('receipt-stats')">📋 접수현황</div>
      <div class="side-item admin-only" id="menu-company-stats" onclick="showTab('company-stats')" style="display:none">🏢 업체별 승인금액</div>
      <div class="side-item" id="menu-region-stats" onclick="showTab('region-stats')">🗺️ 지역별 현황</div>
      <div class="side-item admin-only" id="menu-report" onclick="showTab('report')" style="display:none">📈 주간/월간 리포트</div>
    </aside>
    <div class="content" id="main-content">
      <div class="loading">⏳ 데이터 로딩 중...</div>
    </div>
  </main>
</div>

<!-- 고객 상세 패널 -->
<div class="detail-bg" id="detail-bg">
  <div class="detail-modal" id="detail-modal-inner"></div>
</div>

<script>
const SUPABASE_URL = 'https://htkgywosddmnstchbdzq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0a2d5d29zZGRtbnN0Y2hiZHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MTc3NTgsImV4cCI6MjA4OTI5Mzc1OH0.q3PbpmzbXgzQozW9hsFdT2v6i4WSbACte_kqBjMDOcc';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 계정 목록
const ALL_USERS = [
  { id:'admin',   pw:'admin1234',   name:'관리자', role:'admin', color:'#1a6eb5' },
  { id:'siliang', pw:'siliang1234', name:'실장',   role:'admin', color:'#2388e0' },
  { id:'park',    pw:'park1234',    name:'박과장', role:'admin', color:'#27ae60' },
  { id:'ma1',     pw:'ma11234',     name:'마1',    role:'staff', color:'#9b59b6' },
  { id:'ma2',     pw:'ma21234',     name:'마2',    role:'staff', color:'#e07b00' },
  { id:'ma7',     pw:'ma71234',     name:'마7',    role:'staff', color:'#d63031' },
  { id:'ma6',     pw:'ma61234',     name:'마6',    role:'staff', color:'#16a085' },
  { id:'ma8',     pw:'ma81234',     name:'마8',    role:'staff', color:'#8e44ad' },
];

const STATUS_LABELS = {
  waiting:'대기', interview:'면담요청', today:'오늘면담건', confirmed:'면담확정건',
  rejected:'부결', absent:'부재', cancel:'본인취소', oneweek:'1주1진',
  negative:'네가티브', preapproved:'가승인', thinking:'생각중관리', fax:'팩스요청',
  notme:'본인아님', noapp:'신청X', nonface:'비대면요청', transport:'운수업', approved:'승인'
};

const STATUS_COLORS = {
  approved:'#1a6eb5', waiting:'#6b7a8d', today:'#e64a19', confirmed:'#27ae60',
  rejected:'#e74c3c', absent:'#e07b00', cancel:'#8e44ad', interview:'#2980b9'
};

const COMPANIES = ['배정전','뉴2','1028','7786','ST비','대박','파이낸셜','천과장','왕실장','스타대부','페퍼대부','8184','오사장','전국25','6327','임부장','4652'];
const REGIONS = ['선택','서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주'];
const ROUTES = ['오토콜','수동콜','온라인','지사','BC','지인소개','문자','기타'];

let currentUser = null;
let currentTab = 'dashboard';
let searchQ = '';
let activeFilter = 'all';
let agentFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 50;
let detailId = null;
let allCustomers = [];
let realtimeChannel = null;

// ── 로그인 ──
function doLogin() {
  const id = document.getElementById('inp-id').value.trim();
  const pw = document.getElementById('inp-pw').value;
  const u = ALL_USERS.find(x => x.id === id && x.pw === pw);
  if (!u) { document.getElementById('login-error').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.'; return; }
  currentUser = u;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdr-avatar').textContent = u.name[0];
  document.getElementById('hdr-avatar').style.background = u.color;
  document.getElementById('hdr-name').textContent = u.name;
  const rTag = document.getElementById('hdr-role');
  rTag.textContent = u.role === 'admin' ? '관리자' : '담당자';
  rTag.style.background = u.role === 'admin' ? '#1a6eb5' : '#8e44ad';
  rTag.style.color = '#fff';
  if (u.role === 'admin') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  } else {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  }
  // 지역별 현황은 모두 공개
  document.getElementById('menu-region-stats').style.display = '';
  loadCustomers();
  subscribeRealtime();
}

function doLogout() {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  if (pollingTimer) clearInterval(pollingTimer);
  currentUser = null; allCustomers = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-pw').value = '';
}

document.getElementById('inp-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('inp-id').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-pw').focus(); });

// F5 새로고침
document.addEventListener('keydown', e => {
  if ((e.key==='F5' || (e.ctrlKey&&e.key==='r')) && currentUser) {
    e.preventDefault();
    loadCustomers().then(() => showToast('🔄 새로고침 완료'));
  }
});

// ── 데이터 로드 ──
async function loadCustomers() {
  try {
    let allData = [];
    let from = 0;
    const PAGE = 10000;
    let maxPages = 10;
    while (maxPages-- > 0) {
      let q = sb.from('customers')
        .select('*')
        .order('id', { ascending: false })
        .range(from, from + PAGE - 1);
      if (currentUser.role === 'staff') q = q.eq('agent', currentUser.id);
      const { data, error } = await q;
      if (error) throw error;
      if (!data || data.length === 0) break;
      allData = allData.concat(data);
      if (data.length < PAGE) break;
      from += PAGE;
    }
    allCustomers = allData;
    renderCurrentTab();
    updateResvBtn();

}

// ── 실시간 동기화 ──
let realtimeRenderTimer = null;
let pollingTimer = null;

function subscribeRealtime() {
  // 실시간 구독
  realtimeChannel = sb.channel('customers-changes', {
    config: { broadcast: { self: true } }
  })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'customers' }, async (payload) => {
      if (payload.eventType === 'INSERT') {
        const isVisible = currentUser.role === 'admin' || payload.new.agent === currentUser.id;
        if (isVisible) {
          const exists = allCustomers.find(c => c.id === payload.new.id);
          if (!exists) allCustomers.unshift(payload.new);
        }
      } else if (payload.eventType === 'UPDATE') {
        const idx = allCustomers.findIndex(c => c.id === payload.new.id);
        const isVisible = currentUser.role === 'admin' || payload.new.agent === currentUser.id;
        if (idx !== -1) {
          if (isVisible) allCustomers[idx] = payload.new;
          else allCustomers.splice(idx, 1);
        } else if (isVisible) {
          allCustomers.unshift(payload.new);
        }
        if (detailId === payload.new.id) renderDetail(payload.new);
      } else if (payload.eventType === 'DELETE') {
        allCustomers = allCustomers.filter(c => c.id !== payload.old.id);
      }
      clearTimeout(realtimeRenderTimer);
      realtimeRenderTimer = setTimeout(() => {
        renderCurrentTab();
        updateResvBtn();
        if (currentTab === 'dashboard') refreshDashboardStats();
      }, 300);
    })
    .subscribe((status) => {
      console.log('실시간 구독 상태:', status);
    });

  // 10초마다 변경된 데이터 폴링 (실시간 구독 보완)
  pollingTimer = setInterval(async () => {
    try {
      const since = new Date(Date.now() - 15000).toISOString(); // 15초 이내 변경
      let q = sb.from('customers')
        .select('*')
        .gte('updated_at', since)
        .order('updated_at', { ascending: false });
      if (currentUser.role === 'staff') q = q.eq('agent', currentUser.id);
      const { data } = await q;
      if (!data || data.length === 0) return;
      let changed = false;
      data.forEach(updated => {
        const idx = allCustomers.findIndex(c => c.id === updated.id);
        if (idx !== -1) {
          allCustomers[idx] = updated;
          changed = true;
        } else {
          const isVisible = currentUser.role === 'admin' || updated.agent === currentUser.id;
          if (isVisible) { allCustomers.unshift(updated); changed = true; }
        }
        if (detailId === updated.id) renderDetail(updated);
      });
      if (changed) {
        renderCurrentTab();
        updateResvBtn();
        if (currentTab === 'dashboard') refreshDashboardStats();
      }
    } catch(e) { console.error('폴링 오류', e); }
  }, 10000);
}

  return `<table>
    <thead><tr>
      <th>고객명</th><th>연락처</th><th>신청금액</th><th>업체</th>

      const isDup = phoneCounts[c.phone] > 1;

      const agentName = ALL_USERS.find(u=>u.id===c.agent)?.name || c.agent || '-';
      const prog = Array.isArray(c.progress) ? c.progress : [];
      const latestProg = prog.length > 0 ? prog[prog.length-1].text : '';
      const memo = (latestProg || c.memo || c.counsel_memo || '').split('\n')[0].slice(0,30);
      return `<tr class="${c.status==='approved'?'row-approved':''}" style="border-bottom:2px solid #cbd5e0;" onclick="if(event.target.tagName!=='SELECT'&&event.target.tagName!=='BUTTON'&&event.target.tagName!=='OPTION')openDetail(${c.id})">
        <td>
          ${isDup?'<span class="badge badge-dup">중복</span>':''}

        ${isAdmin?`<td style="font-size:12px;font-weight:700">${agentName}</td>`:''}
        <td><select class="${c.status==='approved'?'status-select st-approved':'status-select'}" onchange="event.stopPropagation();quickChangeStatus(${c.id},this.value)">${statusOpts}</select></td>
        <td style="color:var(--gray);font-size:12px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${memo}</td>
        ${showActions?`<td><button class="d-btn" onclick="event.stopPropagation();openDetail(${c.id})">상세</button></td>`:''}
      </tr>`;
    }).join('')}
    </tbody></table>`;
}

function buildPagination(page, totalPages, total) {
  if (totalPages <= 1) return '';
  let btns = '';
  const start = Math.max(1, page-2), end = Math.min(totalPages, page+2);
  if (start>1) btns += `<button class="pg-btn" onclick="goPage(1)">1</button>${start>2?'…':''}`;
  for (let i=start;i<=end;i++) btns += `<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end<totalPages) btns += `${end<totalPages-1?'…':''}<button class="pg-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  return `<div class="pagination">${btns}<span style="color:var(--gray);font-size:12px;margin-left:8px">총 ${total}건</span></div>`;
}

// ── 빠른 상태 변경 ──
async function quickChangeStatus(id, newStatus) {
  const c = allCustomers.find(x => x.id === id);
  if (!c) return;
  const update = { status: newStatus };
  if (newStatus === 'approved' && c.status !== 'approved') {
    update.approved_at = new Date().toISOString().slice(0,10);
  } else if (newStatus !== 'approved') {
    update.approved_at = null;
  }
  // 진행과정 기록
  const prog = Array.isArray(c.progress) ? [...c.progress] : [];
  const now = new Date();
  const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const progText = `[상태변경] → ${STATUS_LABELS[newStatus]||newStatus}`;
  prog.push({ dt, agent: currentUser.id, text: progText });
  update.progress = prog;
  // 최신 진행과정 → 메인 최근메모에 즉시 반영
  update.memo = progText.slice(0, 30);

  // 메모리 즉시 업데이트 → 통계 카운터 즉시 반영
  Object.assign(c, update);

  await sb.from('customers').update(update).eq('id', id);

  // 통계 카드만 즉시 갱신 (테이블 재렌더 없이)
  if (currentTab === 'dashboard') refreshDashboardStats();
}

// ── 만기알림 뱃지 ──
function getExpiryList() {
  const today = new Date();
  const myList = currentUser.role === 'staff'
    ? allCustomers.filter(c => c.agent === currentUser.id)
    : allCustomers;
  return myList.filter(c => {
    if (c.status !== 'approved' || !c.approved_at) return false;
    const approvedDate = new Date(c.approved_at);
    const diffDays = Math.floor((today - approvedDate) / (1000*60*60*24));
    return diffDays >= 90 && diffDays <= 129;
  }).sort((a, b) => new Date(a.approved_at) - new Date(b.approved_at));
}

function updateExpiryBadge() {
  const badge = document.getElementById('expiry-badge');
  if (!badge) return;
  const cnt = getExpiryList().length;
  if (cnt > 0) { badge.style.display='inline'; badge.textContent=cnt; }
  else { badge.style.display='none'; }
}

// ── 만기알림 ──

  const today = new Date();
  const list = getExpiryList();

  const rows = list.map(c => {

    const remainDays = 129 - diffDays;
    const agentName = ALL_USERS.find(u => u.id === c.agent)?.name || c.agent || '-';
    const urgency = diffDays >= 120 ? 'high' : diffDays >= 105 ? 'mid' : 'low';
    const urgencyColor = urgency==='high' ? '#e74c3c' : urgency==='mid' ? '#e07b00' : '#1a6eb5';
    const urgencyLabel = urgency==='high' ? '🔴 긴급' : urgency==='mid' ? '🟠 주의' : '🔵 안내';

async function saveNewCustomer() {
  try {
    const btn = document.querySelector('.d-btn.primary');
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

    const name = document.getElementById('nc-name').value.trim();
    const phone = document.getElementById('nc-phone').value.trim();
    const amount = parseInt(document.getElementById('nc-amount').value)||0;
    if (!name) { alert('이름을 입력하세요.'); if (btn) { btn.disabled=false; btn.textContent='💾 저장'; } return; }
    if (!phone) { alert('휴대폰번호를 입력하세요.'); if (btn) { btn.disabled=false; btn.textContent='💾 저장'; } return; }
    const today = new Date().toISOString().slice(0,10);
    const region = document.getElementById('nc-region').value;
    const ins4El = document.querySelector('input[name="nc-ins4"]:checked');
    const resvEl = document.getElementById('nc-reservation');
    const resvNameEl = document.getElementById('nc-reservation-name');
    const memoEl = document.getElementById('nc-memo');
    const { data, error } = await sb.from('customers').insert({
      name, phone, amount,
      status: document.getElementById('nc-status').value,
      agent: document.getElementById('nc-agent').value,
      company: document.getElementById('nc-company').value,
      route: document.getElementById('nc-route').value,
      region: region === '선택' ? '' : region,
      dob: document.getElementById('nc-dob').value.trim(),
      gender: document.getElementById('nc-gender').value,
      job: document.getElementById('nc-job').value.trim(),
      tenure: document.getElementById('nc-tenure').value.trim(),
      deposit: document.getElementById('nc-deposit').value.trim(),
      revenue: document.getElementById('nc-revenue').value.trim(),
      job_addr: document.getElementById('nc-job-addr').value.trim(),
      insurance4: ins4El?.value || '무',
      reservation_time: resvEl?.value || '',
      reservation_name: resvNameEl?.value.trim() || '',
      counsel_memo: memoEl?.value || '',
      memo: (memoEl?.value || '').split('\n')[0].slice(0,20),
      created: today, progress: [], approvals: []
    }).select().single();
    if (error) { alert('저장 실패: ' + error.message); if (btn) { btn.disabled=false; btn.textContent='💾 저장'; } return; }
    allCustomers.unshift(data);
    closeDetail();
    showToast('✅ 고객이 등록되었습니다');
    renderCurrentTab();

    // 신규고객 등록 시 텔레그램 알림 (당일 유입)
    const agentName2 = ALL_USERS.find(u => u.id === data.agent)?.name || data.agent || '-';
    const dt2 = new Date().toLocaleString('ko-KR');
    const msg2 = `🔔 신규 고객 접수 알림\n\n👤 고객명: ${data.name}\n📞 연락처: ${data.phone || '-'}\n💰 신청금액: ${data.amount ? data.amount.toLocaleString() + '만원' : '-'}\n👨‍💼 담당자: ${agentName2}\n🏢 업체: ${data.company || '배정전'}\n⏰ 접수시간: ${dt2}`;
    sendTelegram(msg2);
  } catch(e) {
    alert('오류: ' + e.message);
    console.error(e);
    const btn = document.querySelector('.d-btn.primary');
    if (btn) { btn.disabled=false; btn.textContent='💾 저장'; }
  }
}

async function openDetail(id) {
  detailId = id;

  const { data, error } = await sb.from('customers').select('*').eq('id', id).single();

}

function toggleApprovedAt(status) {
  const wrap = document.getElementById('approved-at-wrap');
  if (!wrap) return;
  wrap.style.display = status === 'approved' ? 'flex' : 'none';
  if (status === 'approved') {
    const inp = document.getElementById('d-approved-at');
    if (inp && !inp.value) inp.value = new Date().toISOString().slice(0,10);
  }
}

async function saveDetail() {
  const c = allCustomers.find(x => x.id === detailId);
  if (!c) return;
  const status = document.getElementById('d-status').value;
  let approved_at = c.approved_at;
  if (status === 'approved') {
    const inp = document.getElementById('d-approved-at');
    approved_at = inp?.value || new Date().toISOString().slice(0,10);
  } else { approved_at = null; }

  const update = {
    status,
    agent: document.getElementById('d-agent').value,
    company: document.getElementById('d-company').value,
    route: document.getElementById('d-route').value,
    name: document.getElementById('d-name').value.trim() || c.name,
    phone: document.getElementById('d-phone').value.trim(),
    dob: document.getElementById('d-dob').value.trim(),
    gender: document.getElementById('d-gender').value,
    region: document.getElementById('d-region').value === '선택' ? '' : document.getElementById('d-region').value,
    job: document.getElementById('d-job').value.trim(),
    tenure: document.getElementById('d-tenure').value.trim(),
    deposit: document.getElementById('d-deposit').value.trim(),
    revenue: document.getElementById('d-revenue').value.trim(),
    job_addr: document.getElementById('d-job-addr').value.trim(),
    amount: parseInt(document.getElementById('d-amount').value)||c.amount,
    insurance4: document.querySelector('input[name="d-ins4"]:checked')?.value || c.insurance4,
    reservation_time: document.getElementById('d-reservation')?.value || '',
    reservation_name: document.getElementById('d-reservation-name')?.value.trim() || '',
    counsel_memo: document.getElementById('d-counsel-memo').value,
    memo: (() => {
      const prog = Array.isArray(c.progress) ? c.progress : [];
      const latestProg = prog.length > 0 ? prog[prog.length-1].text : '';
      return (latestProg || document.getElementById('d-counsel-memo').value.split('\n')[0]).slice(0,30);
    })(),
    approved_at,
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('customers').update(update).eq('id', detailId);
  if (error) { alert('저장 실패: ' + error.message); return; }
  Object.assign(c, update);
  renderDetail(c);
  showToast('✅ 저장되었습니다');
}

async function deleteCustomer(id) {
  const { error } = await sb.from('customers').delete().eq('id', id);
  if (error) { alert('삭제 실패'); return; }
  allCustomers = allCustomers.filter(c => c.id !== id);
  closeDetail();
  renderCurrentTab();
}

async function addProgress() {
  const text = document.getElementById('prog-input').value.trim();
  if (!text) { alert('내용을 입력하세요.'); return; }
  const c = allCustomers.find(x => x.id === detailId);
  if (!c) return;
  const prog = Array.isArray(c.progress) ? [...c.progress] : [];
  const now = new Date();
  const dt = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  prog.push({ dt, agent: currentUser.id, text });
  // 최신 진행과정 메모를 memo 필드에 동기화 (고객 현황 최근 메모에 반영)
  const latestMemo = text.slice(0, 30);
  const { error } = await sb.from('customers').update({ progress: prog, memo: latestMemo, updated_at: new Date().toISOString() }).eq('id', detailId);
  if (error) { alert('저장 실패'); return; }
  c.progress = prog;
  c.memo = latestMemo;
  document.getElementById('prog-input').value = '';
  document.getElementById('progress-list').innerHTML = prog.slice().reverse().map((p,i) => {
    const agentName = ALL_USERS.find(u=>u.id===p.agent)?.name || p.agent || '';
    return `<div class="progress-item">
      <span class="prog-time">${p.dt}</span>
      <span class="prog-agent" style="background:${ALL_USERS.find(u=>u.id===p.agent)?.color||'#999'}">${agentName}</span>
      <span class="prog-text">${p.text}</span>
      <button class="prog-del" onclick="deleteProgress(${prog.length-1-i})">✕</button>
    </div>`;
  }).join('');
}

async function deleteProgress(idx) {
  if (!confirm('삭제하시겠습니까?')) return;
  const c = allCustomers.find(x => x.id === detailId);
  if (!c) return;
  const prog = Array.isArray(c.progress) ? [...c.progress] : [];
  prog.splice(idx, 1);
  // 삭제 후 최신 진행과정 메모로 memo 필드 동기화
  const latestMemo = prog.length > 0 ? prog[prog.length-1].text.slice(0,30) : (c.counsel_memo||'').split('\n')[0].slice(0,30);
  await sb.from('customers').update({ progress: prog, memo: latestMemo, updated_at: new Date().toISOString() }).eq('id', detailId);
  c.progress = prog;
  c.memo = latestMemo;
  renderDetail(c);
}

async function addApproval() {
  const date = document.getElementById('ap-date').value;
  const bankAmt = parseInt(document.getElementById('ap-bankamt').value);
  const realAmt = parseInt(document.getElementById('ap-realamt').value);
  if (!date || !bankAmt) { alert('날짜와 승인액을 입력하세요.'); return; }
  const c = allCustomers.find(x => x.id === detailId);
  if (!c) return;
  const approvals = Array.isArray(c.approvals) ? [...c.approvals] : [];
  approvals.push({ date, bankAmt, realAmt: realAmt||bankAmt });
  await sb.from('customers').update({ approvals, updated_at: new Date().toISOString() }).eq('id', detailId);
  c.approvals = approvals;
  document.getElementById('ap-bankamt').value = '';
  document.getElementById('ap-realamt').value = '';
  renderDetail(c);
}

async function deleteApproval(idx) {
  if (!confirm('삭제하시겠습니까?')) return;
  const c = allCustomers.find(x => x.id === detailId);
  if (!c) return;
  const approvals = Array.isArray(c.approvals) ? [...c.approvals] : [];
  approvals.splice(idx, 1);
  await sb.from('customers').update({ approvals, updated_at: new Date().toISOString() }).eq('id', detailId);
  c.approvals = approvals;
  renderDetail(c);
}

function closeDetail() {
  document.getElementById('detail-bg').classList.remove('open');
  detailId = null;
  renderCurrentTab();
}

document.getElementById('detail-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('detail-bg')) closeDetail();
});

// ── 유틸 ──
function formatPhone(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length <= 3) input.value = v;
  else if (v.length <= 7) input.value = v.slice(0,3)+'-'+v.slice(3);
  else input.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
}

async function checkPhoneDup(input, currentId) {
  const val = input.value.trim();
  const msg = document.getElementById('phone-dup-msg');
  if (!msg) return;
  if (!val || val.length < 11) { msg.style.display='none'; return; }

  // 전체 고객에서 검색 (담당자 무관)
  const { data: dups } = await sb.from('customers')
    .select('id,name,phone,created,dob,job,tenure,deposit,revenue,job_addr,amount,region,gender,agent')
    .eq('phone', val)
    .neq('id', currentId || 0);

  if (dups && dups.length > 0) {
    const latest = dups.reduce((a,b) => (a.created||'') > (b.created||'') ? a : b);
    const agentName = ALL_USERS.find(u => u.id === latest.agent)?.name || latest.agent || '';
    msg.innerHTML = `총 <span style="color:var(--accent);font-weight:800">${dups.length}건</span> | 최근접수: <span style="color:var(--blue);font-weight:800">${latest.created||'-'}</span> (${latest.name} / ${agentName})
      ${currentId===0 ? `<button onclick="autoFillFromDup(${latest.id})" style="margin-left:10px;padding:2px 10px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">📋 정보 불러오기</button>` : ''}`;
    msg.style.display = 'block';
    input.style.borderColor = 'var(--red)';
    input.style.background = '#fff5f5';
  } else {
    msg.style.display = 'none';
    input.style.borderColor = '';
    input.style.background = '';
  }
}

// 신규등록 시 기존 고객 정보 자동 채우기
async function autoFillFromDup(id) {
  // allCustomers에 없을 수 있으니 Supabase에서 직접 조회
  let c = allCustomers.find(x => x.id === id);
  if (!c) {
    const { data } = await sb.from('customers').select('*').eq('id', id).single();
    c = data;
  }
  if (!c) return;
  const fields = [
    ['nc-name', c.name],
    ['nc-dob', c.dob],
    ['nc-job', c.job],
    ['nc-tenure', c.tenure],
    ['nc-deposit', c.deposit],
    ['nc-revenue', c.revenue],
    ['nc-job-addr', c.job_addr],
    ['nc-amount', c.amount],
  ];
  fields.forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el && val) el.value = val;
  });
  const regionEl = document.getElementById('nc-region');
  if (regionEl && c.region) regionEl.value = c.region;
  const genderEl = document.getElementById('nc-gender');
  if (genderEl && c.gender) genderEl.value = c.gender;
  showToast('✅ 기존 고객 정보를 불러왔습니다');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── 업체별 승인금액 (관리자 전용) ──
function renderCompanyStats() {
  const now = new Date();
  const thisYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthLabel = `${now.getFullYear()}년 ${now.getMonth()+1}월`;

  // 이번달 승인 고객
  const approved = allCustomers.filter(c => {
    if (c.status !== 'approved') return false;
    return (c.approved_at || c.created || '').startsWith(thisYM);
  });

  // 업체별 집계
  const companyMap = {};
  approved.forEach(c => {
    const co = c.company || '배정전';
    if (!companyMap[co]) companyMap[co] = { cnt: 0, amt: 0 };
    companyMap[co].cnt++;
    companyMap[co].amt += c.amount || 0;
  });

  const rows = Object.entries(companyMap)
    .sort((a,b) => b[1].amt - a[1].amt)
    .map(([co, v], i) => `<tr>
      <td>${i+1}</td>
      <td style="font-weight:700">${co}</td>
      <td style="color:#1a6eb5;font-weight:700">${v.cnt} 건</td>
      <td style="color:var(--accent);font-weight:700">${v.amt.toLocaleString()} 만원</td>
    </tr>`).join('');

  const totalCnt = approved.length;
  const totalAmt = approved.reduce((a,c) => a+(c.amount||0), 0);

  document.getElementById('main-content').innerHTML = `
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">🏢 업체별 승인금액</div>
    <div style="font-size:13px;color:var(--gray);margin-bottom:20px">${monthLabel} 기준 · 매월 자동 초기화</div>
    <div class="stats-row" style="grid-template-columns:repeat(2,1fr);margin-bottom:24px">
      <div class="stat-card" style="border-top:3px solid #1a6eb5">
        <div class="stat-label">총 승인건수</div>
        <div class="stat-num" style="color:#1a6eb5">${totalCnt}<span style="font-size:14px;color:var(--gray)"> 건</span></div>
      </div>
      <div class="stat-card" style="border-top:3px solid var(--accent)">
        <div class="stat-label">총 승인금액</div>
        <div class="stat-num" style="font-size:22px;color:var(--accent)">${totalAmt.toLocaleString()}<span style="font-size:13px"> 만원</span></div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>순위</th><th>업체명</th><th>승인건수</th><th>승인금액</th></tr></thead>
        <tbody>
          ${rows || '<tr><td colspan="4" style="text-align:center;padding:30px;color:var(--gray)">이번 달 승인내역이 없습니다</td></tr>'}
          ${rows ? `<tr style="font-weight:800;background:#f5f8fc">
            <td colspan="2">합 계</td>
            <td style="color:#1a6eb5">${totalCnt} 건</td>
            <td style="color:var(--accent)">${totalAmt.toLocaleString()} 만원</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>`;
}

// ── 지역별 현황 (전체 공유) ──
function renderRegionStats() {
  const now = new Date();
  const thisYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthLabel = `${now.getFullYear()}년 ${now.getMonth()+1}월`;

  // 전체 공유
  const list = allCustomers;

  // 이번달 승인 고객
  const approved = list.filter(c => {
    if (c.status !== 'approved') return false;
    return (c.approved_at || c.created || '').startsWith(thisYM);
  });

  // 지역별 집계
  const REGION_LIST = ['서울','경기','인천','부산','대구','대전','광주','울산','세종','강원','충북','충남','전북','전남','경북','경남','제주','기타'];
  const regionMap = {};
  approved.forEach(c => {
    let region = c.region || '기타';
    if (!REGION_LIST.includes(region)) region = '기타';
    if (!regionMap[region]) regionMap[region] = { cnt: 0, amt: 0 };
    regionMap[region].cnt++;
    regionMap[region].amt += c.amount || 0;
  });

  const rows = Object.entries(regionMap)
    .sort((a,b) => b[1].cnt - a[1].cnt)
    .map(([region, v], i) => `<tr>
      <td>${i+1}</td>
      <td style="font-weight:700">${region}</td>
      <td style="color:#1a6eb5;font-weight:700">${v.cnt} 건</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;height:8px;background:#eee;border-radius:4px;min-width:80px">
            <div style="width:${Math.round(v.cnt/Math.max(...Object.values(regionMap).map(x=>x.cnt))*100)}%;height:100%;background:var(--blue);border-radius:4px"></div>
          </div>
        </div>
      </td>
    </tr>`).join('');

          <div style="font-size:12px;color:var(--gray);margin-bottom:6px;font-weight:700">사용 횟수</div>

        </div>
        <div style="margin-bottom:20px">
          <div style="font-size:12px;color:var(--gray);margin-bottom:6px;font-weight:700">메모 (선택)</div>

function openPhoneUsageForm(agent, ym) {
  const agentName = ALL_USERS.find(u => u.id === agent)?.name || agent;
  document.getElementById('pu-agent').value = agent;
  document.getElementById('pu-ym').value = ym;
  document.getElementById('pu-form-agent-label').textContent = `담당자: ${agentName} / ${ym.replace('-','년 ')}월`;
  document.getElementById('pu-phone').value = '';
  document.getElementById('pu-count').value = '1';
  document.getElementById('pu-memo').value = '';
  document.getElementById('pu-form').style.display = 'flex';
}

async function savePhoneUsage() {
  const agent = document.getElementById('pu-agent').value;
  const ym = document.getElementById('pu-ym').value;
  const phone = document.getElementById('pu-phone').value.trim();
  const count = parseInt(document.getElementById('pu-count').value)||1;
  const memo = document.getElementById('pu-memo').value.trim();
  if (!phone) { alert('발신번호를 입력하세요.'); return; }
  await sb.from('phone_usage').insert({ agent, ym, phone, count, memo, updated_at: new Date().toISOString() });
  document.getElementById('pu-form').style.display = 'none';
  showToast('✅ 저장되었습니다');
  renderPhoneUsage();
}

async function deletePhoneUsage(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await sb.from('phone_usage').delete().eq('id', id);
  showToast('✅ 삭제되었습니다');
  renderPhoneUsage();
}

// ── 접수현황 ──
async function renderReceiptStats() {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const thisYM = today.slice(0,7);

  // 이번주 월요일 구하기
  const day = now.getDay();
  const mondayOffset = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);
  const mondayStr = monday.toISOString().slice(0,10);

  // 박과장, 관리자(admin) 제외, staff + 실장 포함
  const staffList = ALL_USERS.filter(u => u.role === 'staff' || u.id === 'siliang');

  // 전체 고객 직접 조회 (staff도 전체 접수현황 공유)
  const { data: receiptData } = await sb.from('customers')
    .select('agent,created,route')
    .gte('created', thisYM + '-01');
  const monthList = receiptData || [];

  const ROUTE_LABELS = { '오토콜':'오토', '수동콜':'수동', '온라인':'온라인', '지사':'지사', 'BC':'BC', '지인소개':'지인', '문자':'문자', '기타':'기타' };

  const rows = staffList.map(u => {
    const todayList = monthList.filter(c => c.agent === u.id && (c.created||'').startsWith(today));
    const weekList = monthList.filter(c => c.agent === u.id && (c.created||'') >= mondayStr);
    const monthUserList = monthList.filter(c => c.agent === u.id);

    // 경로별 오늘 집계
    const todayRouteCounts = ROUTES.map(r => {
      const cnt = todayList.filter(c => c.route === r).length;
      return cnt > 0 ? `<span style="font-size:11px;color:var(--gray2)">${ROUTE_LABELS[r]||r} <b style="color:#e64a19">${cnt}</b></span>` : null;
    }).filter(Boolean).join(' | ');

    return `<tr style="border-bottom:2px solid #cbd5e0">
      <td style="padding:12px 16px;font-weight:800">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${u.color};margin-right:6px"></span>${u.name}
      </td>
      <td style="padding:12px 16px;text-align:center">
        <span style="font-size:20px;font-weight:800;color:${todayList.length>0?'#e64a19':'var(--gray)'}">${todayList.length}</span>
        <span style="font-size:11px;color:var(--gray)"> 건</span>
      </td>
      <td style="padding:12px 16px;font-size:12px">
        ${todayRouteCounts || '<span style="color:#ccc;font-size:12px">-</span>'}
      </td>
      <td style="padding:12px 16px;text-align:center">
        <span style="font-size:20px;font-weight:800;color:${weekList.length>0?'#2980b9':'var(--gray)'}">${weekList.length}</span>
        <span style="font-size:11px;color:var(--gray)"> 건</span>
      </td>
      <td style="padding:12px 16px;text-align:center">
        <span style="font-size:20px;font-weight:800;color:${monthUserList.length>0?'#27ae60':'var(--gray)'}">${monthUserList.length}</span>
        <span style="font-size:11px;color:var(--gray)"> 건</span>
      </td>
    </tr>`;
  });

  // 합계
  const totalToday = monthList.filter(c => c.created?.startsWith(today)).length;
  const totalWeek = monthList.filter(c => (c.created||'') >= mondayStr).length;
  const totalMonth = monthList.length;

  // 데일리 제로 - 오늘 0건 담당자 + 연속 0건 일수 계산
  const zeroStaff = staffList.filter(u => {
    const todayCnt = monthList.filter(c => c.agent === u.id && (c.created||'').startsWith(today)).length;
    return todayCnt === 0;
  }).map(u => {
    // 연속 0건 일수 계산 (오늘부터 거슬러 올라가며)
    let zeroDays = 0;
    for (let i = 0; i < 30; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      const dStr = d.toISOString().slice(0,10);
      // 주말 제외 (토:6, 일:0)
      if (d.getDay() === 0 || d.getDay() === 6) continue;
      const dayCnt = (receiptData||[]).filter(c => c.agent === u.id && (c.created||'').startsWith(dStr)).length || allCustomers.filter(c => c.agent === u.id && (c.created||'').startsWith(dStr)).length;
      if (dayCnt === 0) zeroDays++;
      else break;
    }
    return { ...u, zeroDays };
  }).sort((a,b) => b.zeroDays - a.zeroDays);

  const zeroBadges = zeroStaff.length > 0 ? zeroStaff.map(u =>
    `<span style="display:inline-flex;align-items:center;gap:6px;background:#fff5f5;border:1px solid #fed7d7;border-radius:20px;padding:5px 14px;margin:3px">
      <span style="width:8px;height:8px;border-radius:50%;background:${u.color};display:inline-block"></span>
      <span style="font-weight:800;font-size:13px">${u.name}</span>
      <span style="color:#e74c3c;font-weight:700;font-size:13px">${u.zeroDays}일째 0건</span>
    </span>`
  ).join('') : `<span style="color:#27ae60;font-weight:700">🎉 오늘 전원 접수 완료!</span>`;

  document.getElementById('main-content').innerHTML = `
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">📋 접수현황</div>
    <div style="font-size:13px;color:var(--gray);margin-bottom:20px">${thisYM.replace('-','년 ')}월 기준 · 매월 자동 초기화 · 담당자만</div>

    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
      <div class="stat-card" style="border-top:3px solid #e64a19">
        <div class="stat-label" style="color:#e64a19;font-weight:800">오늘 접수</div>
        <div class="stat-num" style="color:#e64a19">${totalToday}<span style="font-size:14px;color:var(--gray)"> 건</span></div>
        <div class="stat-sub">${today}</div>
      </div>
      <div class="stat-card" style="border-top:3px solid #2980b9">
        <div class="stat-label" style="color:#2980b9;font-weight:800">이번주 접수</div>
        <div class="stat-num" style="color:#2980b9">${totalWeek}<span style="font-size:14px;color:var(--gray)"> 건</span></div>
        <div class="stat-sub">${mondayStr} ~ 오늘</div>
      </div>
      <div class="stat-card" style="border-top:3px solid #27ae60">
        <div class="stat-label" style="color:#27ae60;font-weight:800">이번달 접수</div>
        <div class="stat-num" style="color:#27ae60">${totalMonth}<span style="font-size:14px;color:var(--gray)"> 건</span></div>
        <div class="stat-sub">${thisYM.replace('-','년 ')}월 전체</div>
      </div>
    </div>

    <!-- 데일리 제로 -->
    <div style="background:#fff;border:1px solid #fed7d7;border-radius:12px;padding:16px 20px;margin-bottom:20px">
      <div style="font-size:14px;font-weight:800;color:#e74c3c;margin-bottom:10px">🚨 데일리 제로 (오늘 0건 · 주말 제외)</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        ${zeroBadges}
      </div>
    </div>

    <div class="table-wrap">
      <table style="width:100%;border-collapse:collapse">
        <thead style="background:#f5f8fc">
          <tr>
            <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px">담당자</th>
            <th style="padding:12px 16px;text-align:center;font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px">오늘</th>
            <th style="padding:12px 16px;text-align:left;font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px">오늘 경로별</th>
            <th style="padding:12px 16px;text-align:center;font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px">이번주</th>
            <th style="padding:12px 16px;text-align:center;font-size:11px;color:var(--gray);font-weight:700;letter-spacing:1px">이번달</th>
          </tr>
        </thead>
        <tbody>
          ${rows.join('')}
          <tr style="background:#f5f8fc;font-weight:800;border-top:2px solid #a0aec0">
            <td style="padding:12px 16px">합 계</td>
            <td style="padding:12px 16px;text-align:center;color:#e64a19;font-size:18px;font-weight:800">${totalToday}</td>
            <td style="padding:12px 16px"></td>
            <td style="padding:12px 16px;text-align:center;color:#2980b9;font-size:18px;font-weight:800">${totalWeek}</td>

          </tr>
        </tbody>
      </table>
    </div>

// ── 리포트 ──
function renderReport() {
  const now = new Date();
  const thisYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const list = allCustomers.filter(c => (c.created||'').startsWith(thisYM));
  const approved = list.filter(c => c.status === 'approved');
  const totalAmt = approved.reduce((a,c)=>a+(c.amount||0),0);
  const rate = list.length ? Math.round(approved.length/list.length*100) : 0;

  const staffStats = ALL_USERS.filter(u=>u.role==='staff').map(u => {
    const mine = list.filter(c => c.agent === u.id);
    const appList = mine.filter(c => c.status === 'approved');
    const rejected = mine.filter(c => c.status === 'rejected').length;
    return { name:u.name, color:u.color, recv:mine.length, approved:appList.length, approvedAmt:appList.reduce((a,c)=>a+(c.amount||0),0), rejected, rate:mine.length?Math.round(appList.length/mine.length*100):0 };
  }).sort((a,b) => b.approved-a.approved);

  document.getElementById('main-content').innerHTML = `
    <div style="font-size:18px;font-weight:800;margin-bottom:20px">📈 ${thisYM.replace('-','년 ')}월 리포트</div>

      <div class="stat-card" style="border-top:3px solid var(--blue)"><div class="stat-label">총 접수</div><div class="stat-num">${list.length}<span style="font-size:14px;color:var(--gray)"> 건</span></div></div>
      <div class="stat-card" style="border-top:3px solid var(--green)"><div class="stat-label">총 승인</div><div class="stat-num" style="color:var(--green)">${approved.length}<span style="font-size:14px;color:var(--gray)"> 건</span></div></div>
      <div class="stat-card" style="border-top:3px solid var(--accent)"><div class="stat-label">승인 금액</div><div class="stat-num" style="font-size:22px;color:var(--accent)">${totalAmt.toLocaleString()}<span style="font-size:13px"> 만원</span></div></div>
      <div class="stat-card" style="border-top:3px solid #8e44ad"><div class="stat-label">전환율</div><div class="stat-num" style="color:#8e44ad">${rate}<span style="font-size:14px"> %</span></div></div>
    </div>
    <div class="table-wrap">
      <table class="perf-table">
        <thead><tr><th>담당자</th><th>접수</th><th>승인</th><th>부결</th><th>승인금액</th><th>전환율</th></tr></thead>
        <tbody>
          ${staffStats.map(r=>`<tr>
            <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${r.color};margin-right:6px"></span>${r.name}</td>
            <td style="color:var(--blue);font-weight:700">${r.recv}</td>
            <td style="color:var(--green);font-weight:700">${r.approved}</td>
            <td style="color:var(--red)">${r.rejected}</td>
            <td style="color:var(--accent);font-weight:700">${r.approvedAmt.toLocaleString()}만</td>
            <td><div style="display:flex;align-items:center;gap:8px"><div style="width:80px;height:6px;background:#eee;border-radius:3px"><div style="width:${r.rate}%;height:100%;background:${r.rate>=20?'var(--green)':r.rate>=10?'var(--accent)':'var(--red)'};border-radius:3px"></div></div>${r.rate}%</div></td>
          </tr>`).join('')}
          <tr style="font-weight:800;background:#f5f8fc">
            <td>합 계</td>
            <td style="color:var(--blue)">${list.length}</td>
            <td style="color:var(--green)">${approved.length}</td>
            <td style="color:var(--red)">${staffStats.reduce((a,r)=>a+r.rejected,0)}</td>
            <td style="color:var(--accent)">${totalAmt.toLocaleString()}만</td>
            <td>${rate}%</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

// ── ID재배정 ──
async function fixIds() {
  if (!confirm('전체 고객 ID를 재배정합니다. 계속하시겠습니까?')) return;
  showToast('⏳ ID 재배정 중...');
  // Supabase는 auto-increment이므로 별도 재배정 불필요
  showToast('✅ 완료! Supabase는 자동 ID 관리됩니다.');
}
</script>
</body>
</html>
